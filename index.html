<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening FilmUmovies...</title>
  <meta property="og:title" content="FilmUmovies">
  <meta property="og:description" content="Open in FilmUmovies">
  <meta property="og:site_name" content="FilmUmovies">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(220,30,30,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;text-align:center;padding:40px 28px;max-width:380px;width:95%}
    .logo{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
    .logo span{color:#e01e1e}
    .domain{font-size:11px;color:#2a2a2a;letter-spacing:1px;text-transform:uppercase;margin-bottom:48px}
    .ring-wrap{position:relative;width:88px;height:88px;margin:0 auto 24px}
    .ring-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:#1a1a1a;stroke-width:3}
    .ring-fill{fill:none;stroke:#e01e1e;stroke-width:3;stroke-linecap:round;stroke-dasharray:245;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
    .ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff}
    .status{font-size:14px;color:#444;margin-bottom:32px;line-height:1.5}
    .btn-open{display:block;width:100%;padding:14px;background:#e01e1e;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;margin-bottom:10px;letter-spacing:0.2px;transition:background 0.2s}
    .btn-open:hover{background:#c01818}
    .btn-dl{display:none;width:100%;padding:12px;background:#111;color:#555;border:1px solid #1e1e1e;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;text-align:center;transition:all 0.2s}
    .btn-dl:hover{color:#888;border-color:#333}
    .divider{font-size:11px;color:#1e1e1e;margin:14px 0;display:none}
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="wrap">
    <div class="logo">Film<span>U</span>movies</div>
    <div class="domain">cloud.filmu.in</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="39"/>
        <circle class="ring-fill" id="ring" cx="44" cy="44" r="39"/>
      </svg>
      <div class="ring-num" id="num">7</div>
    </div>
    <div class="status" id="status">Opening in FilmUmovies...</div>
    <a class="btn-open" id="btn-open" href="#">Open FilmUmovies</a>
    <div class="divider" id="divider">App not installed?</div>
    <a class="btn-dl" id="btn-dl" href="https://download.filmu.in/movies">Download FilmUmovies</a>
  </div>
  <script>
    var TOTAL=7,count=TOTAL,circ=245;
    var ring=document.getElementById('ring');
    var numEl=document.getElementById('num');
    var statusEl=document.getElementById('status');
    var btnDl=document.getElementById('btn-dl');
    var divider=document.getElementById('divider');
    var btnOpen=document.getElementById('btn-open');
    var timer;
    function setRing(n){ring.style.strokeDashoffset=circ*(1-n/TOTAL);numEl.innerText=n;}
    function onExpired(){
      statusEl.innerText="Couldn't open FilmUmovies.";
      btnDl.style.display='block';
      divider.style.display='block';
      setTimeout(function(){window.location.href='https://download.filmu.in/movies';},1500);
    }
    function tick(){count--;setRing(count);if(count<=0){clearInterval(timer);onExpired();}}
    function tryOpen(){
      var params=new URLSearchParams(window.location.search);
      var r=params.get('redirectto');
      if(!r){statusEl.innerText='Missing redirect link.';return;}
      var decoded;
      try{decoded=decodeURIComponent(r);}catch(e){statusEl.innerText='Invalid link.';return;}
      btnOpen.href=decoded;
      window.location.href=decoded;
      setRing(TOTAL);
      timer=setInterval(tick,1000);
    }
    window.onload=tryOpen;
  </script>
</body>
</html>
